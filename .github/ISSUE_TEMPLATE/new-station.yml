name: "\U0001F4FB New station suggestion"
description: Suggest a radio station to add to live_streams.sii
labels: ["new-station"]
body:
  - type: markdown
    attributes:
      value: |
        Stations are pulled automatically from the [Fandom wiki](https://truck-simulator.fandom.com/wiki/Radio_Stations)
        and the [Radio-Browser](https://www.radio-browser.info/) directory. If a station is
        listed on either source it should appear within two weeks without needing an issue —
        use this for stations missing from both.
  - type: input
    id: station-name
    attributes:
      label: Station name
    validations:
      required: true
  - type: input
    id: stream-url
    attributes:
      label: Direct stream URL
      description: A direct audio stream URL (not a homepage or player page)
      placeholder: "https://..."
    validations:
      required: true
  - type: input
    id: country
    attributes:
      label: Country
    validations:
      required: true
  - type: input
    id: genre
    attributes:
      label: Genre
      placeholder: "e.g. Pop, News, Classic Rock"
    validations:
      required: false
  - type: input
    id: language
    attributes:
      label: Language
      placeholder: "e.g. English, German"
    validations:
      required: false
